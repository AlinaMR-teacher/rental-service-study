services:
  db:
    image: postgres:16-alpine
    container_name: rental-db
    environment:
      POSTGRES_DB: rent_service
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - rental_pg_data:/var/lib/postgresql/data

  server:
    build:
      context: ./server
    container_name: rental-server
    environment:
      PORT: 5000
      HOST: http://localhost
      DB_NAME: rent_service
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: student_secret_key
    ports:
      - "5000:5000"
    depends_on:
      - db

  client:
    build:
      context: ./client/rent-service
      args:
        VITE_API_URL: http://localhost:5000
    container_name: rental-client
    ports:
      - "8080:80"
    depends_on:
      - server

volumes:
  rental_pg_data: